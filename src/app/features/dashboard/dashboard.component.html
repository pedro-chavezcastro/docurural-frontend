<!-- Cabecera de página -->
<app-page-header [kicker]="today" [title]="'Hola, ' + (currentUser()?.fullName?.split(' ')?.[0] ?? '')" subtitle="Bienvenido al sistema de gestión documental" />

<!-- Tarjeta de bienvenida -->
<div class="welcome-card">
  <div class="welcome-card__icon" aria-hidden="true">
    <mat-icon>folder_open</mat-icon>
  </div>
  <div class="welcome-card__body">
    <h2 class="welcome-card__title">Sistema listo</h2>
    <p class="welcome-card__text">
      El repositorio documental de la IERD Miña y Ticha está configurado y listo para usar.
      Las secciones de documentos, búsqueda y estadísticas estarán disponibles en los
      siguientes sprints.
    </p>
  </div>
</div>
