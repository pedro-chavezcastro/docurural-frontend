<h2 mat-dialog-title class="dialog__title">{{ title() }}</h2>

<mat-dialog-content class="dialog__content">
  @if (errorMessage()) {
    <app-alert variant="error" class="dialog__alert">{{ errorMessage() }}</app-alert>
  }
  <p class="dialog__message">
    ¿Está seguro de {{ isDeactivate() ? 'desactivar' : 'activar' }} la cuenta de
    <strong>{{ data.user.fullName }}</strong>?
  </p>
  <p class="dialog__hint">{{ secondaryMessage() }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end" class="dialog__actions">
  <app-button variant="secondary" [disabled]="loading()" (click)="cancel()">
    Cancelar
  </app-button>
  <app-button
    [variant]="isDeactivate() ? 'danger' : 'primary'"
    [loading]="loading()"
    [disabled]="actionDisabled()"
    (click)="confirm()"
  >
    {{ actionLabel() }}
  </app-button>
</mat-dialog-actions>
