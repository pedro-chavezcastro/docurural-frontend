<div class="dialog">

  <!-- Header: ícono grande centrado + título -->
  <div class="dialog__header">
    <h2 class="dialog__title">{{ title() }}</h2>
  </div>

  <!-- Banner de error (estados 5 y 6) -->
  @if (errorMessage()) {
    <div class="dialog__banner dialog__banner--error" role="alert">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="flex-shrink: 0; margin-top: 1px;">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ errorMessage() }}
    </div>
  }

  <!-- Cuerpo: mensaje principal + mensaje secundario -->
  <div class="dialog__body">
    <p class="dialog__message">
      ¿Está seguro de {{ isDeactivate() ? 'desactivar' : 'activar' }} la cuenta de
      <strong>{{ data.user.fullName }}</strong>?
    </p>
    <p class="dialog__hint">{{ secondaryMessage() }}</p>
  </div>

  <!-- Footer: Cancelar + acción -->
  <div class="dialog__footer">
    <button
      class="btn btn--secondary"
      type="button"
      [disabled]="loading()"
      (click)="cancel()"
    >
      Cancelar
    </button>
    <button
      class="btn btn--action"
      [class.btn--action-deactivate]="isDeactivate()"
      [class.btn--action-activate]="!isDeactivate()"
      type="button"
      [disabled]="actionDisabled()"
      [attr.aria-busy]="loading() || null"
      (click)="confirm()"
    >
      @if (loading()) {
        <svg class="spinner" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="9" stroke="rgba(255,255,255,0.35)" stroke-width="2.5"/>
          <path d="M21 12a9 9 0 0 0-9-9" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        Procesando...
      } @else {
        {{ actionLabel() }}
      }
    </button>
  </div>

</div>
